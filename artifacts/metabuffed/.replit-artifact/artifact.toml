kind = "web"
previewPath = "/"
title = "Metabuffed"
version = "1.0.0"
id = "artifacts/metabuffed"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25750

[services.development]
run = "pnpm --filter @workspace/metabuffed run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/metabuffed", "run", "build" ]
publicDir = "artifacts/metabuffed/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25750"
BASE_PATH = "/"
